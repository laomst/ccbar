name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Verify Plugin
        run: ./gradlew verifyPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: build/distributions/*.zip

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          if [ -n "$PUBLISH_TOKEN" ]; then
            ./gradlew publishPlugin
          else
            echo "PUBLISH_TOKEN not set, skipping JetBrains Marketplace publish"
            echo "Plugin artifact uploaded to GitHub Release"
          fi

      - name: Sync to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          if [ -n "$GITEE_TOKEN" ]; then
            echo "Syncing to Gitee Release..."
            curl -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: token $GITEE_TOKEN" \
              "https://gitee.com/api/v5/repos/laomst/ccbar/releases" \
              -d '{
                "tag_name": "${{ github.ref_name }}",
                "name": "${{ github.ref_name }}",
                "body": "See [CHANGELOG.md](https://github.com/laomst/ccbar/blob/main/CHANGELOG.md) for details.",
                "draft": false,
                "prerelease": false
              }'
          else
            echo "GITEE_ACCESS_TOKEN not set, skipping Gitee Release"
          fi
