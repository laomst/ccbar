name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Verify Plugin
        run: ./gradlew verifyPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: build/distributions/*.zip

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          if [ -n "$PUBLISH_TOKEN" ]; then
            ./gradlew publishPlugin -PpublishToken=$PUBLISH_TOKEN
          else
            echo "PUBLISH_TOKEN not set, skipping JetBrains Marketplace publish"
            echo "Plugin artifact uploaded to GitHub Release"
          fi

      - name: Sync to Gitee Release
        if: ${{ secrets.GITEE_ACCESS_TOKEN }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITEE_ACCESS_TOKEN }}
          owner: laomst
          repo: ccbar
          bodyFile: CHANGELOG.md
          artifacts: build/distributions/*.zip
